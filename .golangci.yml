version: "2"
run:
  go: "1.26"
output:
  formats:
    text:
      path: stdout
linters:
  enable:
    - asciicheck
    - bidichk
    - depguard
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - goheader
    - gomodguard
    - goprintffuncname
    - importas
    - lll
    - makezero
    - misspell
    - nakedret
    - nilnil
    - nlreturn
    - nolintlint
    - predeclared
    - promlinter
    - revive
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - usetesting
    - varnamelen
    - wsl_v5
  disable:
    - ireturn
  settings:
    depguard:
      rules:
        main:
          allow:
            - github.com/onsi/ginkgo/v2/types
            - k8s.io/apimachinery
            - k8s.io/api
            - k8s.io/utils
            - k8s.io/client-go
            - k8s.io/klog/v2
            - github.com/go-logr/logr
            - github.com/kelseyhightower
            - github.com/openshift
            - sigs.k8s.io/controller-runtime
            - $gostd
            - github.com/stretchr/testify
            - gopkg.in/yaml.v2
            - github.com/rh-ecosystem-edge/eco-goinfra
            - github.com/medik8s/system-tests
          deny:
            - pkg: github.com/onsi**
    funlen:
      lines: 90
      statements: 40
    misspell:
      ignore-rules:
        - nto
    revive:
      rules:
        - name: indent-error-flow
        - name: var-naming
          arguments:
            - []
            - []
            - - skipPackageNameCollisionWithGoStd: true
        - name: increment-decrement
        - name: exported
          arguments:
            - disableStutteringCheck
    staticcheck:
      checks:
        - all
        # Incorrect or missing package comment.
        # https://staticcheck.dev/docs/checks/#ST1000
        - -ST1000
        # Omit embedded fields from selector expression.
        # https://staticcheck.dev/docs/checks/#QF1008
        - -QF1008
      dot-import-whitelist:
        - github.com/onsi/gomega
        - github.com/onsi/ginkgo/v2
        - github.com/medik8s/system-tests/tests/internal/inittools
        - github.com/medik8s/system-tests/tests/internal/medik8sinittools
    wsl:
      strict-append: false
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gochecknoinits
        path: tests/internal/inittools
      - linters:
          - gochecknoinits
        path: tests/internal/medik8sinittools
      - linters:
          - gochecknoinits
        path: tests/internal/reporter
      - linters:
          - depguard
        path: tests/internal/inittools
      - linters:
          - depguard
        path: tests/internal/reporter
      - linters:
          - depguard
        path: tests/.*/tests/.*
      - linters:
          - depguard
        path: tests/.*/.*suite_test.go
      - path: (.+)\.go$
        text: "can't run linter goanalysis_metalinter: inspect: failed to load"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
